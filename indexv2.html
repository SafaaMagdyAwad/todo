<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern ToDo App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- <link rel="stylesheet" href="style.css"> -->
    <link rel="stylesheet" href="stylev2.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
</head>

<body>

    <div class="todo-card">
        <header>
            <h1><i class="fa-solid fa-list-check"></i> ToDo Taskmaster</h1>
            <div id="notificationStatus" class="info-message"></div>
        </header>

        <div class="input-container">
            <div class="input-group main-input">
                <input id="taskInput" type="text" placeholder="What needs to be done?" />
            </div>
            
            <div class="datetime-group">
                <div class="input-group">
                    <label for="reminderDate">Date</label>
                    <input type="date" id="reminderDate">
                </div>
                <div class="input-group">
                    <label for="reminderTime">Time</label>
                    <input type="time" id="reminderTime">
                </div>
            </div>

            <button id="addTaskBtn">
                <i class="fa-solid fa-plus"></i> Add Task
            </button>
            
            <span id="spanMessage" class="span"></span>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="width: 10%;">Done</th>
                        <th style="width: 50%;">Task</th>
                        <th style="width: 25%;">Deadline</th>
                        <th style="width: 15%; text-align: center;">Delete</th>
                    </tr>
                </thead>
                <tbody id="taskTable">
                    <tr>
                        <td><input type="checkbox" class="task-checkbox"></td>
                        <td><span class="task-text">Finish CSS Refactoring</span></td>
                        <td><span class="deadline-badge">June 15, 14:00</span></td>
                        <td style="text-align: center;"><button class="btn-delete"><i class="fa-regular fa-trash-can"></i></button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
